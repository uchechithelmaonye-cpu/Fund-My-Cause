name: Log Aggregation Setup

on:
  workflow_dispatch:
    inputs:
      log_backend:
        description: 'Log aggregation backend'
        required: true
        default: 'loki'
        type: choice
        options:
          - loki
          - elk
          - datadog

jobs:
  setup-logging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Loki Stack
        if: github.event.inputs.log_backend == 'loki'
        run: |
          echo "Setting up Loki log aggregation..."
          
          # Create Loki configuration
          mkdir -p /tmp/loki
          cat > /tmp/loki/loki-config.yml << 'EOF'
          auth_enabled: false
          
          ingester:
            chunk_idle_period: 3m
            chunk_retain_period: 1m
            max_chunk_age: 1h
            chunk_encoding: snappy
            lifecycler:
              ring:
                kvstore:
                  store: inmemory
                replication_factor: 1
          
          limits_config:
            enforce_metric_name: false
            reject_old_samples: true
            reject_old_samples_max_age: 168h
          
          schema_config:
            configs:
              - from: 2020-10-24
                store: boltdb-shipper
                object_store: filesystem
                schema: v11
                index:
                  prefix: index_
                  period: 24h
          
          server:
            http_listen_port: 3100
            log_level: info
          
          storage_config:
            boltdb_shipper:
              active_index_directory: /loki/boltdb-shipper-active
              cache_location: /loki/boltdb-shipper-cache
              shared_store: filesystem
            filesystem:
              directory: /loki/chunks
          
          chunk_store_config:
            max_look_back_period: 0s
          
          table_manager:
            retention_deletes_enabled: false
            retention_period: 0s
          EOF
          
          echo "✓ Loki configuration created"

      - name: Setup ELK Stack
        if: github.event.inputs.log_backend == 'elk'
        run: |
          echo "Setting up ELK (Elasticsearch, Logstash, Kibana) stack..."
          
          # Create Elasticsearch configuration
          mkdir -p /tmp/elk/elasticsearch
          cat > /tmp/elk/elasticsearch/elasticsearch.yml << 'EOF'
          cluster.name: fund-my-cause
          node.name: node-1
          discovery.type: single-node
          xpack.security.enabled: false
          
          http.port: 9200
          http.host: 0.0.0.0
          
          indices.memory.index_buffer_size: 30%
          EOF
          
          # Create Logstash configuration
          mkdir -p /tmp/elk/logstash
          cat > /tmp/elk/logstash/logstash.conf << 'EOF'
          input {
            tcp {
              port => 5000
              codec => json
            }
            http {
              port => 8080
              codec => json
            }
          }
          
          filter {
            if [type] == "frontend" {
              mutate {
                add_field => { "[@metadata][index_name]" => "frontend-%{+YYYY.MM.dd}" }
              }
            }
            if [type] == "contract" {
              mutate {
                add_field => { "[@metadata][index_name]" => "contract-%{+YYYY.MM.dd}" }
              }
            }
          }
          
          output {
            elasticsearch {
              hosts => ["elasticsearch:9200"]
              index => "%{[@metadata][index_name]}"
            }
          }
          EOF
          
          echo "✓ ELK configuration created"

      - name: Setup Datadog Integration
        if: github.event.inputs.log_backend == 'datadog'
        run: |
          echo "Setting up Datadog log integration..."
          
          # Create Datadog agent configuration
          mkdir -p /tmp/datadog
          cat > /tmp/datadog/datadog.yml << 'EOF'
          api_key: ${DD_API_KEY}
          site: datadoghq.com
          
          logs_enabled: true
          
          logs_config:
            container_collect_all: true
            
          listeners:
            - name: docker
          
          config_providers:
            - name: docker
              polling: true
          
          logs:
            - type: docker
              service: fund-my-cause-frontend
              source: frontend
              tags:
                - env:production
                - service:frontend
            
            - type: docker
              service: fund-my-cause-contract
              source: contract
              tags:
                - env:production
                - service:contract
          EOF
          
          echo "✓ Datadog configuration created"

      - name: Create Docker Compose for logging
        run: |
          cat > /tmp/docker-compose-logging.yml << 'EOF'
          version: '3.8'
          
          services:
            # Loki
            loki:
              image: grafana/loki:latest
              ports:
                - "3100:3100"
              volumes:
                - ./loki-config.yml:/etc/loki/local-config.yml
                - loki-storage:/loki
              command: -config.file=/etc/loki/local-config.yml
              networks:
                - logging
          
            # Promtail (log shipper for Loki)
            promtail:
              image: grafana/promtail:latest
              volumes:
                - /var/log:/var/log
                - /var/lib/docker/containers:/var/lib/docker/containers:ro
                - /var/run/docker.sock:/var/run/docker.sock
              command: -config.file=/etc/promtail/config.yml
              networks:
                - logging
              depends_on:
                - loki
          
            # Grafana
            grafana:
              image: grafana/grafana:latest
              ports:
                - "3000:3000"
              environment:
                - GF_SECURITY_ADMIN_PASSWORD=admin
                - GF_USERS_ALLOW_SIGN_UP=false
              volumes:
                - grafana-storage:/var/lib/grafana
              networks:
                - logging
              depends_on:
                - loki
          
            # Elasticsearch
            elasticsearch:
              image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
              environment:
                - discovery.type=single-node
                - xpack.security.enabled=false
              ports:
                - "9200:9200"
              volumes:
                - elasticsearch-storage:/usr/share/elasticsearch/data
              networks:
                - logging
          
            # Kibana
            kibana:
              image: docker.elastic.co/kibana/kibana:8.0.0
              ports:
                - "5601:5601"
              environment:
                - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
              networks:
                - logging
              depends_on:
                - elasticsearch
          
            # Logstash
            logstash:
              image: docker.elastic.co/logstash/logstash:8.0.0
              ports:
                - "5000:5000"
                - "8080:8080"
              volumes:
                - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
              environment:
                - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
              networks:
                - logging
              depends_on:
                - elasticsearch
          
          volumes:
            loki-storage:
            grafana-storage:
            elasticsearch-storage:
          
          networks:
            logging:
              driver: bridge
          EOF
          
          echo "✓ Docker Compose logging stack created"

      - name: Create structured logging configuration
        run: |
          mkdir -p /tmp/logging-config
          
          # Frontend logging configuration
          cat > /tmp/logging-config/frontend-logger.ts << 'EOF'
          import pino from 'pino';
          
          const logger = pino({
            level: process.env.LOG_LEVEL || 'info',
            transport: {
              target: 'pino-http-send',
              options: {
                url: process.env.LOG_ENDPOINT || 'http://localhost:8080',
                timeout: 10000,
                retry: {
                  retries: 3,
                  factor: 2,
                },
              },
            },
            formatters: {
              level: (label) => {
                return { level: label };
              },
            },
            timestamp: pino.stdTimeFunctions.isoTime,
            base: {
              service: 'fund-my-cause-frontend',
              environment: process.env.NODE_ENV || 'development',
              version: process.env.APP_VERSION || '1.0.0',
            },
          });
          
          export default logger;
          EOF
          
          # Contract logging configuration
          cat > /tmp/logging-config/contract-logger.rs << 'EOF'
          use soroban_sdk::log;
          
          pub fn log_info(env: &soroban_sdk::Env, message: &str) {
              log!(env, "INFO: {}", message);
          }
          
          pub fn log_error(env: &soroban_sdk::Env, message: &str) {
              log!(env, "ERROR: {}", message);
          }
          
          pub fn log_debug(env: &soroban_sdk::Env, message: &str) {
              log!(env, "DEBUG: {}", message);
          }
          EOF
          
          echo "✓ Structured logging configuration created"

      - name: Create log analysis dashboards
        run: |
          mkdir -p /tmp/dashboards
          
          # Grafana dashboard for Loki
          cat > /tmp/dashboards/grafana-dashboard.json << 'EOF'
          {
            "dashboard": {
              "title": "Fund-My-Cause Logs",
              "panels": [
                {
                  "title": "Log Volume",
                  "targets": [
                    {
                      "expr": "rate(logs_total[5m])"
                    }
                  ]
                },
                {
                  "title": "Error Rate",
                  "targets": [
                    {
                      "expr": "rate(logs_total{level=\"error\"}[5m])"
                    }
                  ]
                },
                {
                  "title": "Frontend Logs",
                  "targets": [
                    {
                      "expr": "{service=\"frontend\"}"
                    }
                  ]
                },
                {
                  "title": "Contract Logs",
                  "targets": [
                    {
                      "expr": "{service=\"contract\"}"
                    }
                  ]
                }
              ]
            }
          }
          EOF
          
          echo "✓ Grafana dashboard created"

      - name: Create log-based alerts
        run: |
          mkdir -p /tmp/alerts
          
          # Prometheus alert rules
          cat > /tmp/alerts/alert-rules.yml << 'EOF'
          groups:
            - name: fund-my-cause-logs
              rules:
                - alert: HighErrorRate
                  expr: rate(logs_total{level="error"}[5m]) > 0.05
                  for: 5m
                  annotations:
                    summary: "High error rate detected"
                    description: "Error rate is {{ $value }} errors/sec"
                
                - alert: ContractExecutionFailure
                  expr: rate(logs_total{service="contract", level="error"}[5m]) > 0.01
                  for: 2m
                  annotations:
                    summary: "Contract execution failures detected"
                    description: "{{ $value }} contract errors/sec"
                
                - alert: FrontendCrashLoop
                  expr: rate(logs_total{service="frontend", message=~".*crash.*"}[5m]) > 0
                  for: 1m
                  annotations:
                    summary: "Frontend crash detected"
                    description: "Frontend service is crashing"
                
                - alert: LogIngestionBacklog
                  expr: rate(logs_ingested_total[5m]) < rate(logs_total[5m])
                  for: 10m
                  annotations:
                    summary: "Log ingestion backlog"
                    description: "Logs are being generated faster than ingested"
          EOF
          
          echo "✓ Alert rules created"

      - name: Create logging documentation
        run: |
          cat > /tmp/LOGGING_SETUP.md << 'EOF'
          # Logging Setup Guide
          
          ## Quick Start
          
          1. Choose log backend:
             - Loki: Lightweight, Grafana-native
             - ELK: Full-featured, Kibana dashboards
             - Datadog: Managed service
          
          2. Deploy logging stack:
             ```bash
             docker-compose -f docker-compose-logging.yml up -d
             ```
          
          3. Configure applications:
             - Frontend: Use pino logger
             - Contract: Use soroban logging
          
          4. Access dashboards:
             - Grafana: http://localhost:3000
             - Kibana: http://localhost:5601
          
          ## Log Levels
          
          - DEBUG: Detailed diagnostic information
          - INFO: General informational messages
          - WARN: Warning messages
          - ERROR: Error messages
          - FATAL: Fatal errors
          
          ## Structured Logging Format
          
          ```json
          {
            "timestamp": "2024-04-27T14:29:20Z",
            "level": "info",
            "service": "frontend",
            "message": "Campaign created",
            "campaign_id": "abc123",
            "user_id": "user456",
            "duration_ms": 245
          }
          ```
          
          ## Querying Logs
          
          ### Loki
          ```
          {service="frontend"} | json | level="error"
          ```
          
          ### Elasticsearch
          ```
          service:frontend AND level:error
          ```
          
          ## Retention Policies
          
          - Development: 7 days
          - Staging: 30 days
          - Production: 90 days
          EOF
          
          echo "✓ Logging documentation created"

      - name: Generate setup summary
        run: |
          {
            echo "## Log Aggregation Setup Complete"
            echo ""
            echo "### Backend: ${{ github.event.inputs.log_backend }}"
            echo ""
            echo "### Components Configured"
            echo "- [x] Log aggregation service"
            echo "- [x] Structured logging"
            echo "- [x] Log shipping"
            echo "- [x] Analysis dashboards"
            echo "- [x] Alert rules"
            echo ""
            echo "### Next Steps"
            echo "1. Deploy logging stack: \`docker-compose -f docker-compose-logging.yml up -d\`"
            echo "2. Configure application logging"
            echo "3. Access dashboards"
            echo "4. Set up alerts"
            echo ""
            echo "### Dashboard URLs"
            echo "- Grafana: http://localhost:3000"
            echo "- Kibana: http://localhost:5601"
          } >> $GITHUB_STEP_SUMMARY
