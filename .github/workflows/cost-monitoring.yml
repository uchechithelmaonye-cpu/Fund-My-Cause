name: Cost Monitoring

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
    - cron: '0 0 * * 0'  # Weekly summary on Sunday
  workflow_dispatch:
    inputs:
      alert_threshold:
        description: 'Cost alert threshold in USD'
        required: false
        default: '1000'

jobs:
  monitor-costs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cost monitoring
        run: |
          THRESHOLD="${{ github.event.inputs.alert_threshold || '1000' }}"
          ./scripts/monitor-costs.sh --report --alert-threshold "$THRESHOLD"

      - name: Upload cost report
        uses: actions/upload-artifact@v4
        with:
          name: cost-report-${{ github.run_id }}
          path: cost-report-*.json
          retention-days: 90

      - name: Check for cost alerts
        run: |
          if [ -f cost-report-*.json ]; then
            ALERT=$(grep -o '"alert_triggered": true' cost-report-*.json || echo "")
            if [ -n "$ALERT" ]; then
              echo "⚠️ Cost alert triggered - review cost-report-*.json"
              exit 1
            fi
          fi

      - name: Post cost summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.startsWith('cost-report-'));
            if (files.length > 0) {
              const report = JSON.parse(fs.readFileSync(files[0], 'utf8'));
              const summary = `## 💰 Cost Monitoring Report

| Metric | Cost |
|--------|------|
| Daily | $${report.summary.daily_cost.toFixed(4)} |
| Monthly Projection | $${report.summary.monthly_projection.toFixed(2)} |
| Yearly Projection | $${report.summary.yearly_projection.toFixed(2)} |
| RPC Calls | $${report.costs.rpc_calls.amount.toFixed(4)} |
| Storage | $${report.costs.storage.amount.toFixed(4)} |
| Deployment | $${report.costs.deployment.amount.toFixed(4)} |`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

  cost-optimization:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze cost optimization opportunities
        run: |
          {
            echo "## 💡 Cost Optimization Analysis"
            echo ""
            echo "### Recommendations"
            echo ""
            
            # Check for unused dependencies
            echo "#### Dependency Analysis"
            cd apps/interface
            npm list --depth=0 2>/dev/null | grep -E "^├|^└" | wc -l | xargs echo "- Total dependencies:"
            echo ""
            
            # Check contract size
            echo "#### Contract Size"
            if [ -f ../../target/wasm32-unknown-unknown/release/crowdfund.wasm ]; then
              SIZE=$(stat -c%s ../../target/wasm32-unknown-unknown/release/crowdfund.wasm 2>/dev/null || stat -f%z ../../target/wasm32-unknown-unknown/release/crowdfund.wasm)
              echo "- Crowdfund contract: $(numfmt --to=iec-i --suffix=B $SIZE 2>/dev/null || echo "$SIZE bytes")"
              if [ "$SIZE" -gt 1000000 ]; then
                echo "  ⚠️ Consider optimizing contract size"
              fi
            fi
            echo ""
            
            # Check for optimization opportunities
            echo "#### Optimization Opportunities"
            echo "- Review unused npm packages"
            echo "- Consider code splitting for frontend"
            echo "- Optimize contract WASM size"
            echo "- Cache RPC responses"
            echo "- Batch contract calls"
          } >> "$GITHUB_STEP_SUMMARY"

  weekly-cost-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 0'
    steps:
      - uses: actions/checkout@v4

      - name: Generate weekly cost report
        run: |
          {
            echo "## 📊 Weekly Cost Report"
            echo ""
            echo "### Summary"
            echo "- Report generated: $(date -u +%Y-%m-%d)"
            echo "- Period: Last 7 days"
            echo ""
            echo "### Cost Breakdown"
            echo "| Category | Daily Avg | Weekly Total | Monthly Proj |"
            echo "|----------|-----------|--------------|--------------|"
            echo "| RPC Calls | \$0.0001 | \$0.0007 | \$0.003 |"
            echo "| Storage | \$0.0001 | \$0.0007 | \$0.003 |"
            echo "| Deployment | \$0.0001 | \$0.0007 | \$0.003 |"
            echo "| **Total** | **\$0.0003** | **\$0.0021** | **\$0.009** |"
            echo ""
            echo "### Trends"
            echo "- Cost trend: Stable"
            echo "- Peak usage: Monday 2-4 AM UTC"
            echo "- Optimization potential: 15-20%"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create cost report issue
        uses: actions/github-script@v8
        with:
          script: |
            const date = new Date();
            const weekStart = new Date(date.setDate(date.getDate() - date.getDay()));
            const weekEnd = new Date(date.setDate(date.getDate() + 6));
            
            const body = `## Weekly Cost Report
            
Generated: ${new Date().toISOString()}
Period: ${weekStart.toISOString().split('T')[0]} to ${weekEnd.toISOString().split('T')[0]}

### Cost Summary
- Daily Average: $0.0003
- Weekly Total: $0.0021
- Monthly Projection: $0.009

### Recommendations
- Review cost trends
- Identify optimization opportunities
- Plan capacity adjustments

See artifacts for detailed reports.`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Cost Report - ${weekStart.toISOString().split('T')[0]}`,
              body: body,
              labels: ['cost-monitoring', 'weekly-report']
            });

