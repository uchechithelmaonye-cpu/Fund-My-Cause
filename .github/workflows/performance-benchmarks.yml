name: Performance Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  rust-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install criterion
        run: cargo install cargo-criterion

      - name: Run Rust benchmarks
        run: cargo criterion --message-format=json > benchmark-results.json || true

      - name: Generate benchmark report
        run: |
          {
            echo "## 📊 Rust Contract Benchmarks"
            echo ""
            if [ -f target/criterion/*/new/estimates.json ]; then
              echo "### Performance Metrics"
              echo ""
              echo "| Function | Mean Time | Std Dev |"
              echo "|---|---|---|"
              for dir in target/criterion/*/new/; do
                if [ -f "$dir/estimates.json" ]; then
                  name=$(basename $(dirname $(dirname "$dir")))
                  mean=$(jq -r '.mean.point_estimate' "$dir/estimates.json" 2>/dev/null || echo "N/A")
                  std=$(jq -r '.std_dev.point_estimate' "$dir/estimates.json" 2>/dev/null || echo "N/A")
                  echo "| $name | ${mean}ns | ${std}ns |"
                fi
              done
            else
              echo "No benchmark data available"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: rust-benchmarks
          path: target/criterion/

  lighthouse-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/interface/package-lock.json

      - name: Install dependencies
        working-directory: apps/interface
        run: npm ci

      - name: Build frontend
        working-directory: apps/interface
        env:
          NEXT_PUBLIC_CROWDFUND_CONTRACT_ID: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
          NEXT_PUBLIC_REGISTRY_CONTRACT_ID: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        working-directory: apps/interface
        run: |
          lhci autorun --config=../lighthouserc.json || echo "Lighthouse CI completed with warnings"

      - name: Parse Lighthouse results
        run: |
          {
            echo "## 🔦 Lighthouse Performance Report"
            echo ""
            if [ -f .lighthouseci/manifest.json ]; then
              echo "### Scores"
              echo ""
              echo "| Category | Score |"
              echo "|---|---|"
              for file in .lighthouseci/lhr-*.json; do
                if [ -f "$file" ]; then
                  perf=$(jq -r '.categories.performance.score * 100' "$file" 2>/dev/null || echo "0")
                  a11y=$(jq -r '.categories.accessibility.score * 100' "$file" 2>/dev/null || echo "0")
                  bp=$(jq -r '.categories["best-practices"].score * 100' "$file" 2>/dev/null || echo "0")
                  seo=$(jq -r '.categories.seo.score * 100' "$file" 2>/dev/null || echo "0")
                  echo "| Performance | ${perf}% |"
                  echo "| Accessibility | ${a11y}% |"
                  echo "| Best Practices | ${bp}% |"
                  echo "| SEO | ${seo}% |"
                  break
                fi
              done
            else
              echo "No Lighthouse data available"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check performance thresholds
        run: |
          FAILED=0
          if [ -f .lighthouseci/lhr-*.json ]; then
            for file in .lighthouseci/lhr-*.json; do
              perf=$(jq -r '.categories.performance.score' "$file" 2>/dev/null || echo "0")
              if (( $(echo "$perf < 0.7" | bc -l) )); then
                echo "❌ Performance score ${perf} is below threshold 0.7"
                FAILED=1
              fi
              break
            done
          fi
          if [ "$FAILED" -eq 1 ]; then
            echo "Performance degradation detected!"
            exit 1
          fi

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
