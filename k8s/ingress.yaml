apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fund-my-cause-ingress
  namespace: fund-my-cause
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - fund-my-cause.example.com
    secretName: fund-my-cause-tls
  rules:
  - host: fund-my-cause.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fund-my-cause-frontend
            port:
              number: 80
